<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Your Reel Diet</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main>
    <div id="receipt">
      <div class="receipt-header">
        <h1>YOUR REEL DIET</h1>
        <div class="date" id="date"></div>
      </div>
      <div class="totals">
        <div>session: <span id="session-time">0m 0s</span></div>
        <div>watched: <span id="watched-count">0</span></div>
        <div>skipped: <span id="skipped-count">0</span></div>
      </div>
      <div id="bars"></div>
    </div>
    <div class="actions">
      <button id="share">Share as PNG</button>
      <button id="reset" class="secondary">Reset session</button>
    </div>
  </main>
  <script type="module" src="./main.ts"></script>
</body>
</html>
